<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Macbeth Quiz</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    text-align: center;
  }
  #prompt { font-size: 18px; margin-bottom: 10px; }
  #question { font-size: 28px; margin: 20px 0; }
  .choice {
    border: 1px solid #ccc;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 18px;
  }
  .choice:hover { background: #f0f0f0; }
  button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
  }
</style>
</head>
<body>

<h1>Mandarin Quiz</h1>

<div id="prompt"></div>
<div id="question"></div>
<div id="choices"></div>

<button onclick="nextQuestion()">Next</button>
<p id="progress"></p>

<script>
// ----------------------
// Macbeth Questions
// ----------------------
const buddhismQuestions = [

  // ----------------------
  // Topic 1: Founder
  // ----------------------

  { 
    prompt: "Choose the correct answer", 
    q: "Who founded Buddhism?", 
    a: "Siddhartha Gautama",
    choices: ["Confucius","Laozi","Siddhartha Gautama","Ashoka"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "Which of the following were the Four Sights that led Siddhartha to seek enlightenment?", 
    a: "An old man, a sick person, a corpse, and a holy man",
    choices: [
      "An old man, a sick person, a corpse, and a holy man",
      "A king, a soldier, a monk, and a farmer",
      "A rich man, a poor man, a child, and a queen",
      "A temple, a book, a priest, and a statue"
    ] 
  },

  // Four Sight Identification (Extra)
  { 
    prompt: "Choose the correct answer", 
    q: "Siddhartha sees a weak, wrinkled man struggling to walk. Which of the Four Sights is this?", 
    a: "Old age",
    choices: ["Old age","Sickness","Death","Holy man"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "Siddhartha sees someone suffering from disease and pain. Which of the Four Sights is this?", 
    a: "Sickness",
    choices: ["Old age","Sickness","Death","Holy man"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "Siddhartha sees a lifeless body being carried away. Which of the Four Sights is this?", 
    a: "Death",
    choices: ["Old age","Sickness","Death","Holy man"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "Siddhartha sees a calm ascetic who has renounced worldly life. Which of the Four Sights is this?", 
    a: "Holy man",
    choices: ["Old age","Sickness","Death","Holy man"] 
  },

  // ----------------------
  // Topic 2: Buddhism in China
  // ----------------------

  { 
    prompt: "Choose the correct answer", 
    q: "Through which trade route did Buddhism spread to China?", 
    a: "The Silk Road",
    choices: ["The Silk Road","The Grand Canal","The Yellow River","The Himalayas"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "What role did merchants and missionaries play in spreading Buddhism to China?", 
    a: "Missionaries taught Buddhism and merchants carried texts and ideas",
    choices: [
      "Missionaries taught Buddhism and merchants carried texts and ideas",
      "Merchants forced people to convert",
      "Missionaries built armies",
      "Emperors banned translations"
    ] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "Which philosophy influenced filial piety in Chinese Buddhism?", 
    a: "Confucianism",
    choices: ["Confucianism","Daoism","Legalism","Hinduism"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "Which philosophy influenced Chan (Zen) meditation?", 
    a: "Daoism",
    choices: ["Confucianism","Daoism","Legalism","Theravada"] 
  },

  // ----------------------
  // Topic 3: Four Noble Truths
  // ----------------------

  { 
    prompt: "Choose the correct answer", 
    q: "The First Noble Truth teaches that life is what?", 
    a: "Suffering",
    choices: ["Happiness","Suffering","Ignorance","Peace"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "The Second Noble Truth teaches that suffering is caused by:", 
    a: "Craving",
    choices: ["Craving","Karma","Fate","Gods"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "The Fourth Noble Truth teaches that suffering ends through:", 
    a: "The Noble Eightfold Path",
    choices: ["The Five Precepts","The Noble Eightfold Path","Meditation alone","Rebirth"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "The doctrine of no-self (anatta) teaches that:", 
    a: "There is no permanent self or soul",
    choices: [
      "There is no permanent self or soul",
      "The soul lives forever unchanged",
      "Anger is natural and permanent",
      "The self must always be defended"
    ] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "How does no-self relate to anger?", 
    a: "Anger arises when we defend a false sense of self",
    choices: [
      "Anger arises when we defend a false sense of self",
      "Anger is encouraged in Buddhism",
      "Anger leads to enlightenment",
      "Anger has no cause"
    ] 
  },

  // ----------------------
  // Topic 4: Theravada Ethics
  // ----------------------

  { 
    prompt: "Choose the correct answer", 
    q: "What is the primary focus of Theravada Buddhist ethics?", 
    a: "Following the Eightfold Path",
    choices: ["Accumulating wealth","Following the Eightfold Path","Spreading religion","Building an army"] 
  },

  // Five Precepts Identification (Extra)
  { 
    prompt: "Choose the correct answer", 
    q: "Refusing to harm animals reflects which precept?", 
    a: "No killing",
    choices: ["No killing","No stealing","No lying","No sexual misconduct","No intoxicants"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "Returning a lost wallet reflects which precept?", 
    a: "No stealing",
    choices: ["No killing","No stealing","No lying","No sexual misconduct","No intoxicants"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "Admitting the truth even when it is difficult reflects which precept?", 
    a: "No lying",
    choices: ["No killing","No stealing","No lying","No sexual misconduct","No intoxicants"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "Remaining faithful in relationships reflects which precept?", 
    a: "No sexual misconduct",
    choices: ["No killing","No stealing","No lying","No sexual misconduct","No intoxicants"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "Avoiding alcohol to keep the mind clear reflects which precept?", 
    a: "No intoxicants",
    choices: ["No killing","No stealing","No lying","No sexual misconduct","No intoxicants"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "If tempted to lie to avoid trouble, a Theravada Buddhist would:", 
    a: "Tell the truth to remain ethical",
    choices: [
      "Tell the truth to remain ethical",
      "Lie if it helps them",
      "Ignore the situation",
      "Blame someone else"
    ] 
  },

  // ----------------------
  // Topic 5: Mahayana Ethics
  // ----------------------

  { 
    prompt: "True/False", 
    q: "Mahayana Buddhism emphasizes helping others achieve enlightenment.", 
    a: "True",
    choices: ["True","False"] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "A bodhisattva is someone who:", 
    a: "Delays their own enlightenment to help others",
    choices: [
      "Delays their own enlightenment to help others",
      "Seeks wealth and power",
      "Rejects compassion",
      "Lives only for themselves"
    ] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "Mahayana ethics focus on:", 
    a: "Compassion and selflessness",
    choices: [
      "Compassion and selflessness",
      "Military strength",
      "Wealth accumulation",
      "Social hierarchy"
    ] 
  },

  { 
    prompt: "Choose the correct answer", 
    q: "Buddhists believe rebirth happens:", 
    a: "Without a permanent self, shaped by karma",
    choices: [
      "With an eternal soul unchanged",
      "Without a permanent self, shaped by karma",
      "Only once",
      "Only for monks"
    ] 
  }

];
// ----------------------
// Quiz Logic
// ----------------------
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

const quiz = shuffle(buddhismQuestions);

let index = 0;
let score = 0;
let answered = false;

function load() {
  answered = false;
  const item = quiz[index];

  document.getElementById("prompt").textContent = item.prompt;
  document.getElementById("question").textContent = item.q;
  document.getElementById("progress").textContent = `Question ${index+1} of ${quiz.length}`;

  const div = document.getElementById("choices");
  div.innerHTML = "";

  const choices = shuffle(item.choices.slice());

  choices.forEach(c => {
    const el = document.createElement("div");
    el.className = "choice";
    el.textContent = c;
    el.onclick = () => select(c, el, item.a);
    div.appendChild(el);
  });
}

function select(choice, el, correctAnswer) {
  if (answered) return;
  answered = true;

  if (choice === correctAnswer) {
    score++;
    el.style.background = "#c8f7c5";
  } else {
    el.style.background = "#f7c5c5";
    const div = document.getElementById("choices");
    Array.from(div.children).forEach(child => {
      if (child.textContent === correctAnswer) {
        child.style.background = "#c8f7c5";
        child.style.fontWeight = "bold";
      }
    });
  }
}

function nextQuestion() {
  if (!answered) return;
  index++;
  if (index < quiz.length) {
    load();
  } else {
    document.body.innerHTML = `<h1>Quiz Complete</h1><h2>Your Score: ${score} / ${quiz.length}</h2>`;
  }
}

load();
</script>

</body>
</html>
